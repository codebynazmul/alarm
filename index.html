<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AlarmFlow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #000000;
    --surface:   #1c1c1e;
    --card:      #2c2c2e;
    --border:    #38383a;
    --accent:    #ff9f0a;
    --accent-dim:#ff9f0a33;
    --danger:    #ff453a;
    --text:      #ffffff;
    --text2:     #ebebf5cc;
    --muted:     #ebebf599;
    --muted2:    #48484a;
    --green:     #30d158;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .status-icons { display: flex; gap: 6px; align-items: center; font-size: 12px; color: var(--text2); }

  /* ── Header ── */
  .header {
    padding: 8px 24px 12px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .header-title span { color: var(--accent); }
  .alarm-count-badge {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    padding-bottom: 4px;
  }

  /* ── Clock card ── */
  .clock-card {
    margin: 0 16px 16px;
    background: var(--surface);
    border-radius: 22px;
    padding: 22px 24px 18px;
    flex-shrink: 0;
    position: relative;
    overflow: visible;
  }
  .clock-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .clock-time {
    font-size: clamp(54px, 17vw, 70px);
    font-weight: 300;
    letter-spacing: -3px;
    line-height: 1;
    color: var(--text);
    white-space: nowrap;
    display: block;
    width: 100%;
  }
  .clock-time .seconds {
    font-size: clamp(28px, 9vw, 36px);
    font-weight: 300;
    color: var(--accent);
    letter-spacing: -1px;
    vertical-align: baseline;
    margin-left: 2px;
  }
  .clock-date {
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: -0.2px;
  }

  /* ── Alarm List ── */
  .alarm-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 80px;
    scrollbar-width: none;
  }
  .alarm-scroll::-webkit-scrollbar { display: none; }

  .section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: -0.2px;
    padding: 0 4px 10px;
  }

  .alarm-group {
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .alarm-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 14px;
    position: relative;
    transition: background 0.15s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .alarm-row:active {
    background: rgba(255,255,255,0.05);
  }
  .alarm-row:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0; left: 16px; right: 0;
    height: 0.5px;
    background: var(--border);
  }
  .alarm-row.inactive { opacity: 0.45; }

  .alarm-info { flex: 1; min-width: 0; }
  .alarm-time-text {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -1.5px;
    line-height: 1;
    color: var(--text);
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .alarm-ampm {
    font-size: 16px;
    font-weight: 400;
    color: var(--text2);
    letter-spacing: 0;
  }
  .alarm-meta {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .alarm-meta-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--muted2);
    flex-shrink: 0;
  }
  .alarm-days-text { color: var(--accent); font-weight: 500; }

  .alarm-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  /* iOS toggle */
  .toggle {
    width: 51px; height: 31px;
    background: var(--muted2);
    border-radius: 16px;
    position: relative;
    cursor: pointer;
    transition: background 0.25s;
    border: none;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--green); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 27px; height: 27px;
    background: #fff;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .toggle.on::after { transform: translateX(20px); }

  .delete-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: none;
    background: var(--muted2);
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    transition: background 0.2s;
  }
  .delete-btn:hover { background: var(--danger); color: #fff; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 64px 24px 32px;
    color: var(--muted);
  }
  .empty-icon {
    font-size: 52px;
    margin-bottom: 16px;
    display: block;
    opacity: 0.35;
  }
  .empty-title { font-size: 17px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .empty-sub   { font-size: 14px; font-weight: 400; }

  /* ── FAB ── */
  .fab {
    position: absolute;
    bottom: 28px;
    right: 24px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #000;
    font-size: 26px;
    font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(255,159,10,0.45);
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
    z-index: 10;
    line-height: 1;
  }
  .fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(255,159,10,0.3); }

  /* ── Modal ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: flex-end;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .sheet {
    background: #1c1c1e;
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    padding: 12px 0 40px;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(.22,1,.36,1);
  }
  .overlay.open .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--muted2);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .sheet-cancel {
    font-size: 17px;
    font-weight: 400;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
  }
  .sheet-save {
    font-size: 17px;
    font-weight: 600;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
  }
  .sheet-title-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }

  .form-section {
    margin: 16px 20px 0;
  }
  .form-section-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: -0.1px;
    text-transform: uppercase;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.6px;
  }
  .form-group-box {
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .form-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    position: relative;
  }
  .form-row:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0; left: 16px; right: 0;
    height: 0.5px;
    background: var(--border);
  }
  .form-row label {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    width: 80px;
    flex-shrink: 0;
    text-transform: none;
    letter-spacing: normal;
    margin: 0;
  }
  input[type="time"],
  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text2);
    font-family: inherit;
    font-size: 15px;
    font-weight: 400;
    outline: none;
    text-align: right;
    -webkit-appearance: none;
    color-scheme: dark;
  }
  input[type="text"]::placeholder { color: var(--muted); }

  .days-picker {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    justify-content: space-between;
    padding: 12px 16px;
  }
  .day-toggle {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--muted2);
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .day-toggle.selected {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .sound-select {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 16px;
  }
  .sound-opt {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sound-opt.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  /* ── Ringing screen ── */
  .ring-overlay {
    position: fixed; inset: 0;
    background: #000;
    z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
    padding: 40px 32px;
  }
  .ring-overlay.show { opacity: 1; pointer-events: all; }

  .ring-pulse-ring {
    position: relative;
    width: 130px; height: 130px;
    margin-bottom: 36px;
  }
  .wave {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    animation: wave-expand 2s ease-out infinite;
    opacity: 0;
  }
  .wave:nth-child(2) { animation-delay: 0.5s; }
  .wave:nth-child(3) { animation-delay: 1s; }
  .wave:nth-child(4) { animation-delay: 1.5s; }
  @keyframes wave-expand {
    0%   { transform: scale(0.55); opacity: 0.9; }
    100% { transform: scale(2); opacity: 0; }
  }
  .ring-icon {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    animation: bell-rock 0.45s ease-in-out infinite alternate;
  }
  @keyframes bell-rock {
    from { transform: rotate(-18deg); }
    to   { transform: rotate(18deg); }
  }
  .ring-label {
    font-size: 16px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: -0.2px;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 12px;
    font-weight: 600;
  }
  .ring-time {
    font-size: 72px;
    font-weight: 200;
    letter-spacing: -4px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }
  .ring-name {
    font-size: 20px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 56px;
    letter-spacing: -0.3px;
  }
  .ring-btn-row {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 300px;
  }
  .ring-btn {
    flex: 1;
    padding: 0;
    width: 80px; height: 80px;
    border-radius: 50%;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
    letter-spacing: 0.2px;
    flex: none;
  }
  .ring-btn:active { transform: scale(0.94); opacity: 0.85; }
  .btn-snooze  {
    background: var(--card);
    color: var(--text);
    font-size: 12px;
    width: 80px; height: 80px;
  }
  .btn-dismiss {
    background: var(--danger);
    color: #fff;
    width: 80px; height: 80px;
  }
  .ring-btn-icon { font-size: 22px; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 8px 0 12px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: -0.1px;
    flex-shrink: 0;
  }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="app">

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-time" id="status-time">9:41</div>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="4" width="3" height="8" rx="0.8"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="0.8"/><rect x="9" y="0.5" width="3" height="11.5" rx="0.8"/><rect x="13.5" y="0" width="3" height="12" rx="0.8" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.4C13.2 1.5 10.7 0.3 8 0.3C5.3 0.3 2.8 1.5 1 3.4L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" opacity="0.5"/><path d="M8 5.5C9.4 5.5 10.6 6.1 11.5 7L12.9 5.5C11.6 4.2 9.9 3.3 8 3.3C6.1 3.3 4.4 4.2 3.1 5.5L4.5 7C5.4 6.1 6.6 5.5 8 5.5Z" opacity="0.75"/><circle cx="8" cy="10" r="1.5"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="17" height="8" rx="2" fill="currentColor"/><path d="M23 4.5V7.5C23.8 7.2 24.5 6.5 24.5 6C24.5 5.5 23.8 4.8 23 4.5Z" fill="currentColor" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-title">Alarm<span>Flow</span></div>
    <div class="alarm-count-badge" id="alarm-count">0 alarms</div>
  </div>

  <!-- Clock Card -->
  <div class="clock-card">
    <div class="clock-label">Current Time</div>
    <div class="clock-time" id="clock-display">
      <span id="clock-hhmm">00:00</span><span class="seconds" id="clock-ss">:00</span>
    </div>
    <div class="clock-date" id="clock-date">Tuesday, June 9, 2026</div>

  <!-- Alarm List -->
  <div class="alarm-scroll">

  </div>

  <!-- FAB -->
  <button class="fab" id="open-modal" aria-label="Add alarm">＋</button>

  <!-- Footer -->
  <div class="footer">Developed by: <a href="https://www.linkedin.com/in/md-nazmul-hasan-tonmoy/" target="_blank">MD NAZMUL HASAN</a></div>
</div>

<!-- Add/Edit Alarm Sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="sheet-cancel" id="cancel-btn">Cancel</button>
      <span class="sheet-title-text" id="modal-title">Add Alarm</span>
      <button class="sheet-save" id="save-btn">Save</button>
    </div>

    <div class="form-section">
      <div class="form-group-box">
        <div class="form-row">
          <label>Time</label>
          <input type="time" id="alarm-time-input" />
        </div>
        <div class="form-row">
          <label>Label</label>
          <input type="text" id="alarm-label-input" placeholder="Alarm" maxlength="30" />
        </div>
      </div>

      <div class="form-section-label">Repeat</div>
      <div class="form-group-box">
        <div class="days-picker" id="days-picker">
          <button class="day-toggle" data-day="0">S</button>
          <button class="day-toggle" data-day="1">M</button>
          <button class="day-toggle" data-day="2">T</button>
          <button class="day-toggle" data-day="3">W</button>
          <button class="day-toggle" data-day="4">T</button>
          <button class="day-toggle" data-day="5">F</button>
          <button class="day-toggle" data-day="6">S</button>
        </div>
      </div>

      <div class="form-section-label">Sound</div>
      <div class="form-group-box">
        <div class="sound-select" id="sound-select">
          <button class="sound-opt selected" data-sound="beep">Beep</button>
          <button class="sound-opt" data-sound="digital">Digital</button>
          <button class="sound-opt" data-sound="chime">Chime</button>

        </div>
      </div>
    </div>
  </div>
</div>

<!-- Ringing Screen -->
<div class="ring-overlay" id="ring-overlay">
  <div class="ring-pulse-ring">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="ring-icon">🔔</div>
  </div>
  <div class="ring-label">Alarm</div>
  <div class="ring-time" id="ring-time-display">7:00</div>
  <div class="ring-name" id="ring-label-display">Good Morning</div>
  <div class="ring-btn-row">
    <button class="ring-btn btn-snooze" id="snooze-btn">
      <span class="ring-btn-icon">💤</span>Snooze
    </button>
    <button class="ring-btn btn-dismiss" id="dismiss-btn">
      <span class="ring-btn-icon">✕</span>Dismiss
    </button>
  </div>
</div>

<script>
// ── Audio ──────────────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx = null, alarmInterval = null;
function ensureCtx() {
  if (!ctx) ctx = new AudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
}
function playBeep() {
  ensureCtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'square'; o.frequency.value = 880;
  g.gain.setValueAtTime(0.3, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
  o.start(); o.stop(ctx.currentTime + 0.2);
}
function playDigital() {
  ensureCtx();
  [0, 0.15, 0.3].forEach(t => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sawtooth'; o.frequency.value = 1200;
    g.gain.setValueAtTime(0.25, ctx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
    o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.12);
  });
}
function playChime() {
  ensureCtx();
  [523,659,784,1047].forEach((f,i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0.3, ctx.currentTime + i*0.18);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.18 + 0.6);
    o.start(ctx.currentTime + i*0.18); o.stop(ctx.currentTime + i*0.18 + 0.6);
  });
}
function playPulse() {
  ensureCtx();
  [0, 0.35].forEach(t => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'triangle'; o.frequency.value = 660;
    o.frequency.linearRampToValueAtTime(880, ctx.currentTime + t + 0.3);
    g.gain.setValueAtTime(0.35, ctx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.3);
    o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.3);
  });
}
const sounds = { beep: playBeep, digital: playDigital, chime: playChime, pulse: playPulse };
function startAlarmSound(type) {
  stopAlarmSound();
  const fn = sounds[type] || playBeep;
  fn(); alarmInterval = setInterval(fn, 1200);
}
function stopAlarmSound() {
  if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
}

// ── State ──────────────────────────────────────────────────────────────────────
let alarms = JSON.parse(localStorage.getItem('alarmflow_alarms') || '[]');
let currentRingAlarm = null;
let editingAlarmId = null;
const DAY_SHORT = ['S','M','T','W','T','F','S'];
const DAY_NAMES_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function saveAlarms() { localStorage.setItem('alarmflow_alarms', JSON.stringify(alarms)); }

// ── Clock ──────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const hh  = String(now.getHours()).padStart(2,'0');
  const mm  = String(now.getMinutes()).padStart(2,'0');
  const ss  = String(now.getSeconds()).padStart(2,'0');

  const sh = now.getHours() % 12 || 12;
  document.getElementById('status-time').textContent = `${sh}:${mm}`;

  document.getElementById('clock-hhmm').textContent = `${hh}:${mm}`;
  document.getElementById('clock-ss').textContent   = `:${ss}`;

  document.getElementById('clock-date').textContent =
    now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

  checkAlarms(now);
}

// ── Check Alarms ───────────────────────────────────────────────────────────────
const firedThisMinute = new Set();
function checkAlarms(now) {
  const hh  = String(now.getHours()).padStart(2,'0');
  const mm  = String(now.getMinutes()).padStart(2,'0');
  const ss  = now.getSeconds();
  const day = now.getDay();
  if (ss !== 0) return;
  alarms.forEach(a => {
    if (!a.active || a.time !== `${hh}:${mm}`) return;
    const key = `${a.id}-${hh}:${mm}`;
    if (firedThisMinute.has(key)) return;
    const shouldRing = a.days.length === 0 || a.days.includes(day);
    if (!shouldRing) return;
    firedThisMinute.add(key);
    setTimeout(() => firedThisMinute.delete(key), 62000);
    triggerAlarm(a);
  });
}

// ── Ring ───────────────────────────────────────────────────────────────────────
function triggerAlarm(alarm) {
  currentRingAlarm = alarm;
  const [hRaw, m] = alarm.time.split(':');
  const h = parseInt(hRaw), h12 = (h%12)||12, ampm = h>=12?'PM':'AM';
  document.getElementById('ring-time-display').textContent = `${h12}:${m} ${ampm}`;
  document.getElementById('ring-label-display').textContent = alarm.label || 'Alarm';
  document.getElementById('ring-overlay').classList.add('show');
  startAlarmSound(alarm.sound);
}
document.getElementById('dismiss-btn').addEventListener('click', () => {
  stopAlarmSound();
  document.getElementById('ring-overlay').classList.remove('show');
  if (currentRingAlarm && currentRingAlarm.days.length === 0) {
    currentRingAlarm.active = false; saveAlarms(); renderAlarms();
  }
  currentRingAlarm = null;
});
document.getElementById('snooze-btn').addEventListener('click', () => {
  stopAlarmSound();
  document.getElementById('ring-overlay').classList.remove('show');
  if (!currentRingAlarm) return;
  const now = new Date(); now.setMinutes(now.getMinutes() + 5);
  const sh = String(now.getHours()).padStart(2,'0');
  const sm = String(now.getMinutes()).padStart(2,'0');
  alarms.push({ id:'snooze_'+Date.now(), time:`${sh}:${sm}`,
    label:(currentRingAlarm.label||'Alarm')+' · Snoozed',
    days:[], sound:currentRingAlarm.sound, active:true, snooze:true });
  saveAlarms(); renderAlarms(); currentRingAlarm = null;
});

// ── Render ─────────────────────────────────────────────────────────────────────
function renderAlarms() {
  const list  = document.getElementById('alarm-list');
  const lbl   = document.getElementById('alarm-section-label');
  const count = document.getElementById('alarm-count');
  count.textContent = alarms.length === 1 ? '1 alarm' : `${alarms.length} alarms`;

  if (alarms.length === 0) {
    lbl.style.display = 'none';
    list.innerHTML = `<div class="empty-state">
      <span class="empty-icon">⏰</span>
      <div class="empty-title">No Alarms</div>
      <div class="empty-sub">Tap + to schedule your first alarm.</div>
    </div>`;
    return;
  }

  lbl.style.display = 'block';
  const sorted = [...alarms].sort((a,b) => a.time.localeCompare(b.time));

  list.innerHTML = `<div class="alarm-group">${sorted.map(a => {
    const [hRaw, m] = a.time.split(':');
    const h = parseInt(hRaw), h12 = (h%12)||12, ampm = h>=12?'PM':'AM';
    const dayStr = a.days.length === 0
      ? 'Once'
      : a.days.length === 7
        ? 'Every day'
        : a.days.map(d => DAY_NAMES_SHORT[d]).join(', ');
    return `<div class="alarm-row ${a.active ? '' : 'inactive'}" data-id="${a.id}">
      <div class="alarm-info">
        <div class="alarm-time-text">${h12}:${m}<span class="alarm-ampm"> ${ampm}</span></div>
        <div class="alarm-meta">
          <span>${a.label || 'Alarm'}</span>
          <span class="alarm-meta-dot"></span>
          <span class="alarm-days-text">${dayStr}</span>
        </div>
      </div>
      <div class="alarm-right">
        <button class="toggle ${a.active ? 'on' : ''}" data-id="${a.id}" aria-label="Toggle"></button>
        <button class="delete-btn" data-id="${a.id}" aria-label="Delete">✕</button>
      </div>
    </div>`;
  }).join('')}</div>`;

  // Toggle active/inactive
  list.querySelectorAll('.toggle').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = e.currentTarget.dataset.id;
      const alarm = alarms.find(a => a.id === id);
      if (alarm) { alarm.active = !alarm.active; saveAlarms(); renderAlarms(); }
    });
  });

  // Delete alarm
  list.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = e.currentTarget.dataset.id;
      alarms = alarms.filter(a => a.id !== id);
      saveAlarms(); renderAlarms();
    });
  });

  // Edit alarm — tap the row (not toggle or delete button)
  list.querySelectorAll('.alarm-row').forEach(row => {
    row.addEventListener('click', e => {
      // Don't trigger edit if clicking toggle or delete
      if (e.target.closest('.toggle') || e.target.closest('.delete-btn')) return;
      const id = row.dataset.id;
      const alarm = alarms.find(a => a.id === id);
      if (alarm) openEditModal(alarm);
    });
  });
}

// ── Modal ──────────────────────────────────────────────────────────────────────
let selectedDays = [], selectedSound = 'beep';

function openAddModal() {
  editingAlarmId = null;
  document.getElementById('modal-title').textContent = 'Add Alarm';
  document.getElementById('save-btn').textContent = 'Save';
  
  selectedDays = []; 
  selectedSound = 'beep';
  document.getElementById('alarm-time-input').value = '';
  document.getElementById('alarm-label-input').value = '';
  document.querySelectorAll('.day-toggle').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.sound-opt').forEach(b =>
    b.classList.toggle('selected', b.dataset.sound === 'beep'));
  document.getElementById('overlay').classList.add('open');
}

function openEditModal(alarm) {
  editingAlarmId = alarm.id;
  document.getElementById('modal-title').textContent = 'Edit Alarm';
  document.getElementById('save-btn').textContent = 'Done';
  
  selectedDays = [...alarm.days];
  selectedSound = alarm.sound;
  
  document.getElementById('alarm-time-input').value = alarm.time;
  document.getElementById('alarm-label-input').value = alarm.label || '';
  
  document.querySelectorAll('.day-toggle').forEach(btn => {
    const day = parseInt(btn.dataset.day);
    btn.classList.toggle('selected', selectedDays.includes(day));
  });
  
  document.querySelectorAll('.sound-opt').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.sound === selectedSound);
  });
  
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { 
  document.getElementById('overlay').classList.remove('open'); 
  editingAlarmId = null;
}

document.getElementById('open-modal').addEventListener('click', () => {
  ensureCtx();
  openAddModal();
});

document.getElementById('cancel-btn').addEventListener('click', closeModal);

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

document.getElementById('days-picker').addEventListener('click', e => {
  const btn = e.target.closest('.day-toggle'); if (!btn) return;
  const day = parseInt(btn.dataset.day);
  if (selectedDays.includes(day)) { 
    selectedDays = selectedDays.filter(d=>d!==day); 
    btn.classList.remove('selected'); 
  }
  else { 
    selectedDays.push(day); 
    btn.classList.add('selected'); 
  }
});

document.getElementById('sound-select').addEventListener('click', e => {
  const btn = e.target.closest('.sound-opt'); if (!btn) return;
  selectedSound = btn.dataset.sound;
  document.querySelectorAll('.sound-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  (sounds[selectedSound] || playBeep)();
});

document.getElementById('save-btn').addEventListener('click', () => {
  const time = document.getElementById('alarm-time-input').value;
  const label = document.getElementById('alarm-label-input').value.trim();
  if (!time) { document.getElementById('alarm-time-input').focus(); return; }
  
  if (editingAlarmId) {
    // Edit existing alarm
    const alarm = alarms.find(a => a.id === editingAlarmId);
    if (alarm) {
      alarm.time = time;
      alarm.label = label || 'Alarm';
      alarm.days = [...selectedDays];
      alarm.sound = selectedSound;
    }
  } else {
    // Add new alarm
    alarms.push({ 
      id:'alarm_'+Date.now(), 
      time, 
      label:label||'Alarm',
      days:[...selectedDays], 
      sound:selectedSound, 
      active:true 
    });
  }
  
  saveAlarms(); 
  renderAlarms(); 
  closeModal();
});

// ── Init ───────────────────────────────────────────────────────────────────────
renderAlarms();
updateClock();
setInterval(updateClock, 1000);
</script>
